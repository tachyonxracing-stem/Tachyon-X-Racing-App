<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pobierz aplikację</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0f1f, #000814);
    color: white;
    text-align: center;
}

/* glow container */
.card {
    margin-top: 100px;
    display: inline-block;
    padding: 45px;
    background: rgba(10, 20, 40, 0.6);
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0, 180, 255, 0.3);
    backdrop-filter: blur(10px);
}

/* neon title */
h1 {
    margin-bottom: 10px;
    color: #00c8ff;
    text-shadow: 0 0 10px #00c8ff, 0 0 20px #0077ff;
}

/* text */
p {
    opacity: 0.85;
}

/* neon button */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 40px;
    font-size: 18px;
    border-radius: 12px;
    background: transparent;
    color: #00c8ff;
    text-decoration: none;
    border: 2px solid #00c8ff;
    cursor: pointer;
    box-shadow: 0 0 10px #00c8ff;
    transition: 0.3s;
}

.btn:hover {
    background: #00c8ff;
    color: #001018;
    box-shadow: 0 0 25px #00c8ff;
}

/* counter */
.counter {
    margin-top: 20px;
    font-size: 18px;
    color: #7fdfff;
    text-shadow: 0 0 8px #00c8ff;
}
</style>
</head>

<body>

<div class="card">
    <h1>📱 Pobierz aplikację</h1>
    <p>Kliknij przycisk aby pobrać APK</p>

    <!-- DOWNLOAD BUTTON -->
    <a class="btn" href="app.apk" download onclick="increaseDownload()">
        ⬇ Pobierz APK
    </a>

    <div class="counter">
        📊 Liczba pobrań: <span id="count">0</span>
    </div>
</div>

<script>
// 🔥 unikalny klucz licznika
const key = "moja-apka-downloads";

// 📥 pobierz licznik
fetch(`https://api.countapi.xyz/get/${key}`)
.then(res => res.json())
.then(data => {
    document.getElementById("count").innerText = data.value;
});

// ➕ zwiększ licznik przy kliknięciu
function increaseDownload() {
    fetch(`https://api.countapi.xyz/hit/${key}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("count").innerText = data.value;
    });
}
</script>

</body>
</html>
